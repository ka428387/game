
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #game-wrap {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #b8e890 0%, #90cc60 40%, #70aa40 100%);
    border-radius: 20px;
    padding: 14px;
    min-height: 560px;
    position: relative;
    overflow: hidden;
    border: 4px solid #4a8a20;
  }
  #title {
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    color: #1d5a00;
    text-shadow: 2px 2px 0 #fff;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  #canvas-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 10px;
  }
  canvas {
    border-radius: 10px;
    border: 4px solid #4a8a20;
    background: #f5edd8;
    touch-action: none;
    display: block;
  }
  #controls { display: flex; flex-direction: column; align-items: center; gap: 5px; margin-top: 2px; }
  .btn-row { display: flex; gap: 8px; }
  .dir-btn {
    width: 60px; height: 60px; font-size: 26px;
    border: none; border-radius: 14px;
    background: #fff; border: 3px solid #4a8a20;
    color: #1d5a00; cursor: pointer;
    box-shadow: 0 4px 0 #4a8a20;
    transition: transform 0.1s, box-shadow 0.1s;
    user-select: none; -webkit-user-select: none;
  }
  .dir-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #4a8a20; }
  #message {
    font-size: 19px; font-weight: 700; color: #1d5a00;
    text-align: center; min-height: 30px; text-shadow: 1px 1px 0 #fff;
  }
  #steps-bar {
    font-size: 15px; color: #1d5a00; text-align: center;
    font-weight: 600; text-shadow: 1px 1px 0 #fff;
  }
  #restart-btn {
    display: none; padding: 9px 24px; font-size: 19px; font-weight: 700;
    border: 3px solid #4a8a20; border-radius: 14px;
    background: #fff; color: #1d5a00; cursor: pointer;
    box-shadow: 0 4px 0 #4a8a20; margin-top: 2px;
  }
  #restart-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #4a8a20; }
  #level-btns { display: flex; gap: 8px; justify-content: center; margin-bottom: 8px; }
  .lv-btn {
    padding: 5px 14px; font-size: 14px; font-weight: 700;
    border: 2px solid #4a8a20; border-radius: 10px;
    background: #fff; color: #1d5a00; cursor: pointer;
  }
  .lv-btn.active { background: #1d5a00; color: #fff; }
  .tree-deco { position: absolute; font-size: 32px; opacity: 0.35; pointer-events: none; user-select: none; }
</style>

<div id="game-wrap">
  <div class="tree-deco" style="top:4px;left:6px">🌳</div>
  <div class="tree-deco" style="top:4px;right:6px">🌲</div>
  <div class="tree-deco" style="bottom:4px;left:6px">🌿</div>
  <div class="tree-deco" style="bottom:4px;right:6px">🍄</div>

  <div id="title">🌲 もりのめいろ 🌲</div>
  <div id="level-btns">
    <button class="lv-btn" onclick="setLevel(1)">かんたん</button>
    <button class="lv-btn" onclick="setLevel(2)">ふつう</button>
    <button class="lv-btn active" onclick="setLevel(3)">むずかしい</button>
  </div>
  <div id="canvas-wrap">
    <canvas id="maze"></canvas>
    <div id="steps-bar">あるいたマス：0</div>
    <div id="message">やじるしで うごかしてね！</div>
    <button id="restart-btn" onclick="initGame()">もういちど！</button>
    <div id="controls">
      <div class="btn-row"><button class="dir-btn" onclick="move(0,-1)">⬆️</button></div>
      <div class="btn-row">
        <button class="dir-btn" onclick="move(-1,0)">⬅️</button>
        <button class="dir-btn" onclick="move(0,1)">⬇️</button>
        <button class="dir-btn" onclick="move(1,0)">➡️</button>
      </div>
    </div>
  </div>
</div>

<script>
const LEVELS = { 1: {cols:7, rows:7}, 2: {cols:10, rows:10}, 3: {cols:13, rows:13} };
let currentLevel = 3;
let COLS, ROWS, CELL;
let maze, playerX, playerY, goalX, goalY, won, steps, trail;
const canvas = document.getElementById('maze');
const ctx = canvas.getContext('2d');

function setLevel(lv) {
  currentLevel = lv;
  document.querySelectorAll('.lv-btn').forEach((b,i) => b.classList.toggle('active', i+1===lv));
  initGame();
}

function initGame() {
  const cfg = LEVELS[currentLevel];
  COLS = cfg.cols; ROWS = cfg.rows;
  CELL = Math.floor(300 / Math.max(COLS, ROWS));
  const W = CELL * COLS, H = CELL * ROWS;
  canvas.width = W; canvas.height = H;
  playerX = 0; playerY = 0;
  goalX = COLS - 1; goalY = ROWS - 1;
  won = false; steps = 0;
  trail = [];
  document.getElementById('message').textContent = 'やじるしで うごかしてね！';
  document.getElementById('restart-btn').style.display = 'none';
  document.getElementById('steps-bar').textContent = 'あるいたマス：0';
  maze = generateMaze(COLS, ROWS);
  draw();
}

function generateMaze(cols, rows) {
  let walls = [];
  for (let y = 0; y < rows; y++) {
    walls[y] = [];
    for (let x = 0; x < cols; x++) walls[y][x] = { right: true, down: true };
  }
  let visited = [];
  for (let y = 0; y < rows; y++) visited[y] = new Array(cols).fill(false);
  function carve(x, y) {
    visited[y][x] = true;
    let dirs = [[1,0],[-1,0],[0,1],[0,-1]].sort(() => Math.random()-0.5);
    for (let [dx, dy] of dirs) {
      let nx = x+dx, ny = y+dy;
      if (nx>=0 && nx<cols && ny>=0 && ny<rows && !visited[ny][nx]) {
        if (dx===1) walls[y][x].right = false;
        else if (dx===-1) walls[y][nx].right = false;
        else if (dy===1) walls[y][x].down = false;
        else if (dy===-1) walls[ny][x].down = false;
        carve(nx, ny);
      }
    }
  }
  carve(0, 0);
  return walls;
}

function canMove(x, y, dx, dy) {
  if (dx===1) return x<COLS-1 && !maze[y][x].right;
  if (dx===-1) return x>0 && !maze[y][x-1].right;
  if (dy===1) return y<ROWS-1 && !maze[y][x].down;
  if (dy===-1) return y>0 && !maze[y-1][x].down;
  return false;
}

function move(dx, dy) {
  if (won) return;
  if (!canMove(playerX, playerY, dx, dy)) { shakeCanvas(); return; }
  trail.push([playerX, playerY]);
  if (trail.length > 80) trail.shift();
  playerX += dx; playerY += dy;
  steps++;
  document.getElementById('steps-bar').textContent = 'あるいたマス：' + steps;
  draw();
  if (playerX===goalX && playerY===goalY) {
    won = true;
    document.getElementById('message').textContent = '🎉 やったね！ゴール！ 🎉';
    document.getElementById('restart-btn').style.display = 'inline-block';
    drawWin();
  }
}

function shakeCanvas() {
  canvas.style.transition = 'transform 0.05s';
  canvas.style.transform = 'translateX(-5px)';
  setTimeout(()=>{ canvas.style.transform='translateX(5px)'; },60);
  setTimeout(()=>{ canvas.style.transform='translateX(0)'; },120);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#f5edd8';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 通ったあとを薄く表示
  for (let i = 0; i < trail.length; i++) {
    let [tx, ty] = trail[i];
    let alpha = (i / trail.length) * 0.25;
    ctx.fillStyle = `rgba(100,180,60,${alpha})`;
    ctx.fillRect(tx*CELL+1, ty*CELL+1, CELL-2, CELL-2);
  }

  // ゴール
  ctx.fillStyle = '#ffe97a';
  roundRect(ctx, goalX*CELL+2, goalY*CELL+2, CELL-4, CELL-4, 6); ctx.fill();
  // スタート
  ctx.fillStyle = '#d4f0a0';
  roundRect(ctx, 2, 2, CELL-4, CELL-4, 6); ctx.fill();

  // 壁
  ctx.strokeStyle = '#4a8a20';
  ctx.lineWidth = currentLevel === 3 ? 2.5 : 3;
  ctx.lineCap = 'round';
  ctx.strokeRect(1, 1, canvas.width-2, canvas.height-2);
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      let px = x*CELL, py = y*CELL;
      if (maze[y][x].right && x < COLS-1) {
        ctx.beginPath(); ctx.moveTo(px+CELL, py+2); ctx.lineTo(px+CELL, py+CELL-2); ctx.stroke();
      }
      if (maze[y][x].down && y < ROWS-1) {
        ctx.beginPath(); ctx.moveTo(px+2, py+CELL); ctx.lineTo(px+CELL-2, py+CELL); ctx.stroke();
      }
    }
  }

  let em = Math.max(10, CELL * 0.62);
  ctx.font = `${em}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🏠', goalX*CELL+CELL/2, goalY*CELL+CELL/2+1);
  ctx.fillText('🐿️', playerX*CELL+CELL/2, playerY*CELL+CELL/2+1);
}

function drawWin() {
  ctx.fillStyle = 'rgba(255,255,100,0.35)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  let em = Math.max(24, CELL);
  ctx.font = `${em}px serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('🎉', canvas.width/2, canvas.height/2);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

document.addEventListener('keydown', e => {
  if(e.key==='ArrowUp'||e.key==='w') { e.preventDefault(); move(0,-1); }
  if(e.key==='ArrowDown'||e.key==='s') { e.preventDefault(); move(0,1); }
  if(e.key==='ArrowLeft'||e.key==='a') { e.preventDefault(); move(-1,0); }
  if(e.key==='ArrowRight'||e.key==='d') { e.preventDefault(); move(1,0); }
});

initGame();
</script>
