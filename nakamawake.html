<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>なかまはずれは どれ？</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

:root {
  --cream:   #F4EFE4;
  --paper:   #FBF8F2;
  --wood:    #B8845A;
  --wood-dk: #8A5E38;
  --ink:     #3A2A1A;
  --ink-lt:  #7A6050;
  --correct: #4E9E72;
  --wrong:   #C94040;
  --shadow:  rgba(60,30,10,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--cream);
  font-family:'Zen Maru Gothic',sans-serif;
  min-height:100svh;
  display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;
  padding-bottom:32px;
}

/* ヘッダー */
header{
  width:100%;background:var(--wood);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 3px 10px var(--shadow);
  margin-bottom:2px;
}
.app-title{font-size:1.1rem;font-weight:900;color:var(--paper);letter-spacing:.05em}
.star-row{display:flex;gap:3px;flex-wrap:wrap;max-width:160px;justify-content:flex-end}
.star{font-size:1.1rem;transition:transform .3s}
.star.earned{transform:scale(1.25)}

/* 進捗ドット */
.dots{display:flex;gap:7px;margin:14px 0 6px}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(184,132,90,.22);transition:background .3s}
.dot.done  {background:var(--wood)}
.dot.active{background:var(--wood-dk);box-shadow:0 0 0 3px rgba(184,132,90,.3)}

/* 問題カード */
.q-card{
  width:calc(100% - 32px);max-width:440px;
  background:var(--paper);border-radius:22px;
  padding:16px 18px 18px;
  box-shadow:0 4px 16px var(--shadow);
  display:flex;flex-direction:column;align-items:center;gap:9px;
  margin-bottom:10px;
}
.q-tag{display:none}
.q-text{font-size:1.25rem;font-weight:900;color:var(--ink);text-align:center;line-height:1.55}

/* ヒントボタン */
.hint-btn{
  background:none;border:2px solid var(--wood);
  border-radius:20px;padding:5px 18px;
  font-size:.78rem;font-weight:700;
  font-family:'Zen Maru Gothic',sans-serif;
  color:var(--wood);cursor:pointer;
  transition:background .15s,color .15s;
  -webkit-tap-highlight-color:transparent;
}
.hint-btn:active{background:var(--wood);color:var(--paper)}
.hint-bubble{
  font-size:.8rem;font-weight:700;color:var(--ink-lt);
  background:rgba(184,132,90,.1);border-radius:12px;
  padding:8px 14px;text-align:center;line-height:1.5;
  width:100%;
  display:none;
  animation:fadeIn .2s ease;
}
.hint-bubble.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* グリッド */
.grid{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  width:calc(100% - 32px);max-width:440px;
}
.card{
  background:var(--paper);border-radius:18px;
  border:2.5px solid transparent;
  padding:16px 10px 12px;
  display:flex;flex-direction:column;align-items:center;gap:9px;
  cursor:pointer;
  box-shadow:0 4px 0 rgba(0,0,0,.09),0 2px 8px var(--shadow);
  transition:transform .1s,box-shadow .1s;
  -webkit-tap-highlight-color:transparent;user-select:none;
}
.card:active:not(.locked){transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.08)}
.card.correct{border-color:var(--correct);background:#EEF8F2;animation:popUp .45s ease}
.card.wrong  {border-color:var(--wrong);  background:#FDF0F0;animation:shake .38s ease}
.card.faded  {opacity:.28;pointer-events:none}
.card.locked {pointer-events:none}
@keyframes popUp{0%{transform:scale(1)}35%{transform:scale(1.09)}65%{transform:scale(.97)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(4px)}}
.card-img{width:70px;height:70px;display:flex;align-items:center;justify-content:center}
.card-label{font-size:.82rem;font-weight:700;color:var(--ink-lt)}

/* フィードバック */
.feedback{
  width:calc(100% - 32px);max-width:440px;
  border-radius:14px;padding:11px 16px;
  font-size:.92rem;font-weight:900;text-align:center;
  opacity:0;transform:translateY(-6px);
  transition:opacity .25s,transform .25s;pointer-events:none;
  margin-top:4px;
}
.feedback.show{opacity:1;transform:translateY(0)}
.feedback.ok{background:#EEF8F2;color:var(--correct);border:2px solid var(--correct)}
.feedback.ng{background:#FDF0F0;color:var(--wrong);  border:2px solid var(--wrong)}

/* 解説 */
.explain{
  width:calc(100% - 32px);max-width:440px;
  background:rgba(184,132,90,.1);border-radius:12px;
  padding:10px 16px;font-size:.78rem;font-weight:700;
  color:var(--ink-lt);text-align:center;line-height:1.6;
  opacity:0;transition:opacity .3s .15s;margin-top:2px;
}
.explain.show{opacity:1}

/* 次へボタン */
.next-btn{
  background:var(--wood);color:var(--paper);
  border:none;border-radius:50px;padding:13px 44px;
  font-size:1rem;font-weight:900;font-family:'Zen Maru Gothic',sans-serif;
  cursor:pointer;box-shadow:0 4px 0 var(--wood-dk);
  transition:transform .1s,box-shadow .1s,opacity .2s;
  opacity:0;pointer-events:none;letter-spacing:.04em;
  margin-top:8px;
}
.next-btn.show{opacity:1;pointer-events:auto}
.next-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--wood-dk)}

/* 完了画面 */
#completeScreen{display:none;flex-direction:column;align-items:center;gap:16px;padding:40px 20px;text-align:center}
#completeScreen.show{display:flex}
.big-emoji{font-size:4.5rem;animation:bob .7s ease-in-out infinite alternate}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-12px)}}
.complete-title{font-size:1.7rem;font-weight:900;color:var(--ink)}
.complete-sub  {font-size:1rem;color:var(--ink-lt);font-weight:700;line-height:1.7}
.again-btn{
  background:var(--wood);color:var(--paper);border:none;border-radius:50px;
  padding:14px 44px;font-size:1rem;font-weight:900;
  font-family:'Zen Maru Gothic',sans-serif;cursor:pointer;
  box-shadow:0 4px 0 var(--wood-dk);margin-top:6px;
}
.again-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--wood-dk)}
</style>
</head>
<body>

<header>
  <div class="app-title">なかまはずれは どれ？</div>
  <div class="star-row" id="starRow"></div>
</header>

<div class="dots" id="dots"></div>

<div class="q-card" id="qCard">
  <div class="q-tag" id="qTag"></div>
  <div class="q-text" id="qText"></div>
  <button class="hint-btn" id="hintBtn" onclick="showHint()">💡 ヒント</button>
  <div class="hint-bubble" id="hintBubble"></div>
</div>

<div class="grid" id="grid"></div>

<div class="feedback" id="feedback"></div>
<div class="explain"  id="explain"></div>
<button class="next-btn" id="nextBtn" onclick="next()">つぎへ →</button>

<div id="completeScreen">
  <div class="big-emoji">🎊</div>
  <div class="complete-title">ぜんぶ できたよ！</div>
  <div class="complete-sub" id="completeSub"></div>

/* ══════════════════════════════════════
   ゲームエンジン
══════════════════════════════════════ */
const TOTAL = ALL_QS.length; // 16
let qs=[], idx=0, score=0, answered=false;

function shuffle(a){return[...a].sort(()=>Math.random()-.5)}

function init(){
  // 問題の順序はシャッフルするが16問すべて使う
  qs = shuffle(ALL_QS);
  idx=0; score=0; answered=false;
  document.getElementById('completeScreen').classList.remove('show');
  document.getElementById('qCard').style.display='flex';
  document.getElementById('grid').style.display='grid';
  document.getElementById('feedback').className='feedback';
  document.getElementById('explain').className='explain';
  document.getElementById('nextBtn').className='next-btn';
  buildDots(); buildStars(); render();
}

function buildDots(){
  const w=document.getElementById('dots'); w.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const d=document.createElement('div');
    d.className='dot'+(i===0?' active':''); d.id='d'+i; w.appendChild(d);
  }
}
function buildStars(){
  const w=document.getElementById('starRow'); w.innerHTML='';
  for(let i=0;i<TOTAL;i++){
    const s=document.createElement('div');
    s.className='star'; s.id='s'+i; s.textContent='☆'; w.appendChild(s);
  }
}
function updateDots(){
  for(let i=0;i<TOTAL;i++){
    const d=document.getElementById('d'+i); if(!d) return;
    d.className='dot'+(i<idx?'done':i===idx?' active':'');
  }
}

function showHint(){
  const q=qs[idx];
  const bubble=document.getElementById('hintBubble');
  bubble.textContent=q.hint;
  bubble.classList.add('show');
  document.getElementById('hintBtn').style.display='none';
}

function render(){
  answered=false; updateDots();
  const q=qs[idx];
  document.getElementById('qTag').textContent  = q.tag;
  document.getElementById('qText').textContent = 'なかまはずれは　どれ？';
  document.getElementById('hintBtn').style.display='inline-block';
  document.getElementById('hintBubble').className='hint-bubble';
  document.getElementById('hintBubble').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('explain').className ='explain';
  document.getElementById('nextBtn').className ='next-btn';

  const grid=document.getElementById('grid'); grid.innerHTML='';
  shuffle(q.items).forEach(item=>{
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`<div class="card-img">${item.svg}</div><div class="card-label">${item.label}</div>`;
    card.addEventListener('click',()=>tap(card,item.odd,grid,q.explain));
    grid.appendChild(card);
  });
}

function tap(card,isOdd,grid,explain){
  if(answered) return;
  answered=true;
  grid.querySelectorAll('.card').forEach(c=>c.classList.add('locked'));
  const fb=document.getElementById('feedback');
  const ex=document.getElementById('explain');
  if(isOdd){
    card.classList.add('correct');
    score++;
    const s=document.getElementById('s'+idx);
    if(s){s.textContent='⭐';s.classList.add('earned')}
    fb.textContent='⭕ せいかい！ よくわかったね！';
    fb.className='feedback ok show';
  } else {
    card.classList.add('wrong');
    grid.querySelectorAll('.card').forEach(c=>{if(c!==card)c.classList.add('faded')});
    fb.textContent='❌ ちがうよ！ もういちど かんがえてみよう！';
    fb.className='feedback ng show';
  }
  if(explain){ex.textContent='📖 '+explain; ex.className='explain show';}
  document.getElementById('nextBtn').className='next-btn show';
}

function next(){
  idx++;
  if(idx>=TOTAL){showComplete();return;}
  render();
}

function showComplete(){
  document.getElementById('qCard').style.display='none';
  document.getElementById('grid').style.display='none';
  document.getElementById('feedback').className='feedback';
  document.getElementById('explain').className='explain';
  document.getElementById('nextBtn').className='next-btn';
  document.getElementById('dots').innerHTML='';

  const emoji = score===TOTAL ? '🏆' : score>=12 ? '🎊' : score>=8 ? '🌟' : '🌱';
  document.querySelector('.big-emoji').textContent = emoji;

  const cs=document.getElementById('completeScreen');
  cs.classList.add('show');
  const pct=Math.round(score/TOTAL*100);
  const msg = score===TOTAL ? 'ぜんもん せいかい！ かんぺき！！'
            : score>=12    ? 'すごい！ よくできました！'
            : score>=8     ? 'もうすこし！ がんばったね！'
            :                'むずかしかったね！ もういちど ちょうせん！';
  document.getElementById('completeSub').innerHTML=
    `${TOTAL}もんちゅう <strong>${score}もん</strong> せいかい！（${pct}%）<br>${msg}`;
}

function restart(){init()}
init();
